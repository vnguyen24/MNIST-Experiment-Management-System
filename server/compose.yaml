services:
  rabbitmq:
    image: rabbitmq:3.12-management
    ports:
      - '5672:5672'
      - '15672:15672'
    healthcheck:
      test: ['CMD', 'rabbitmqctl', 'status']
      interval: 30s
      timeout: 10s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - MONGODB_CONNSTRING=mongodb+srv://cuong:6cn5c3PMmvS3178v@test.llemyrt.mongodb.net/?retryWrites=true&w=majority
    depends_on:
      rabbitmq:
        condition: service_healthy
    ports:
      - '9000:9000'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000']
      interval: 30s
      timeout: 10s
      retries: 5
